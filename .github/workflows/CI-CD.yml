name: CI-CD

on: workflow_dispatch

jobs:

  lint:
    name: Lint Code

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install requirements
        run:  |
          pip install --upgrade pip
          pip install -r src/backend/services/auth-service/requirements.txt

      - name: Check code style and typing (Mypy, Ruff)
        run: |
          mypy ./src/backend/services/auth-service/src/
          ruff check --fix ./src/backend/services/auth-service/src/ && ruff format ./src/backend/services/auth-service/src/

  test:
    name: Run Tests

    needs: [lint]

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r src/backend/services/auth-service/requirements.txt

      - name: Run tests
        env:
          DATABASE_URL_ASYNC: postgresql+asyncpg://test:test@localhost:5432/test_db
          REDIS_DATABASE_URL: redis://localhost:6379
        run: pytest src/backend/services/auth-service/src/tests/ -s -v

  run:
    name: Run Docker Compose
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create .env file
        working-directory: src/backend/services/auth-service/src
        run: |
          cat > .env << 'EOF'
          DATABASE_URL_ASYNC=${{ secrets.DATABASE_URL_ASYNC }}
          REDIS_DATABASE_URL=${{ secrets.REDIS_DATABASE_URL }}
          OAUTH_GOOGLE_CLIENT_ID=${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET=${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          EOF

      - name: Run Docker Compose
        run: docker compose up --build